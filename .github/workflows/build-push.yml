name: Build & Push Docker images to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image PHP-FPM
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app_php
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.repo }}-php:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push image Caddy
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app_caddy
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.repo }}-caddy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
